apiVersion: apps/v1
kind: Deployment
metadata:
  name: anomaly-service
  namespace: aiops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: anomaly-service
  template:
    metadata:
      labels:
        app: anomaly-service
    spec:
      containers:
      - name: anomaly-service
        image: k3s.local/anomaly-service:v4
        imagePullPolicy: Never  # CRITICAL for Pi local
        ports:
        - containerPort: 8000
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 128Mi
